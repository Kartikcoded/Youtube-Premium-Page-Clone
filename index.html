<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <title>Youtube Premium - Youtube</title>
</head>

<body>
  <div class="container">
    <div class="navbar">
      <div class="left-navbar">
        <img src="Assets/bars.svg" alt="bars-icon" />
        <img src="Assets/yt logo.svg" alt="yt-logo" />
      </div>
      <div class="center-navbar">
        <input type="text" placeholder="Search" />
        <img src="Assets/search.svg" alt="search-icon" />
        <img src="Assets/mic.svg" alt="mic-icon" />
      </div>
      <div class="right-navbar">
        <button><i class="fa-solid fa-plus"></i>Create</button>
        <img src="Assets/bellicon.svg" alt="bell-icon" />
        <img src="Assets/kartik_profile_photo_cropped_processed_by_imagy.jpg" alt="Profile-pic" />
      </div>
    </div>

    <div class="ytpremium">
      <div class="premium-bg"><img src="Assets/premium_lp2_background_creator_collage_dark_web_4098x2304.jpg" alt="">
      </div>
      <div class="premium-details">
        <div class="ytpremium-logo">
          <img src="Assets/ytpremiumlogo.png" alt="">
        </div>
        <div class="premium-desc">
          <h1>Enjoy your favorite creators <br>ad-free</h1>
          <p>YouTube and YouTube Music ad-free, offline, and in the background <br>
          Prepaid and monthly plans available. Starts at ₹89.00​/month. Free trials with monthly plans. <br> Benefits vary by
          plan</p>
          <button>Get YouTube Premium</button>
          <p>Or save money with a <span>shared or student plan</span></p>
          <p>Restrictions apply.</p>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
